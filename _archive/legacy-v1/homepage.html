<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>契合</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --brand: #4a89f3;
      --brand-deep: #3f6fe0;
      --ink: #1a2233;
      --muted: #97a3b6;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: system-ui, -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #ffffff;
    }

    /* 真机上：App 页面铺满整屏 */
    .app {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background:
        radial-gradient(120% 80% at 78% 8%, rgba(120, 170, 255, 0.28) 0%, rgba(120, 170, 255, 0) 55%),
        radial-gradient(110% 70% at 12% 22%, rgba(150, 210, 255, 0.22) 0%, rgba(150, 210, 255, 0) 50%),
        radial-gradient(120% 90% at 50% 108%, rgba(90, 151, 255, 0.20) 0%, rgba(90, 151, 255, 0) 55%),
        linear-gradient(180deg, #f3f7ff 0%, #f8fbff 45%, #ffffff 100%);
    }

    /* 电脑预览时：把 App 约束成 iPhone 12 Pro 尺寸并居中 */
    @media (min-width: 480px) {
      body {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        min-height: 100vh;
        background: radial-gradient(130% 130% at 50% 0%, #eef2f9 0%, #dfe5ef 100%);
      }

      .app {
        width: 390px;
        height: 844px;
        min-height: 0;
        margin-top: auto;
        margin-bottom: auto;
        border-radius: 38px;
        box-shadow:
          0 30px 80px rgba(40, 70, 130, 0.22),
          0 2px 0 rgba(255, 255, 255, 0.6) inset;
      }
    }

    /* Centered brand + slogan */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 28px;
      position: relative;
      z-index: 1;
    }

    .logo-orb {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* 球体背后的环形光晕，缓慢呼吸 */
    .logo-orb::before {
      content: "";
      position: absolute;
      top: -12px;
      left: 50%;
      width: 120px;
      height: 120px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(90, 151, 255, 0.22) 0%, rgba(90, 151, 255, 0) 66%);
      filter: blur(6px);
      z-index: -1;
      animation: halo 5s ease-in-out infinite;
    }

    .logo-mark {
      position: relative;
      width: 82px;
      height: 82px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: logo-float 4.5s ease-in-out infinite;
      background:
        radial-gradient(circle at 32% 26%, #ffffff 0%, rgba(255, 255, 255, 0) 44%),
        linear-gradient(150deg, #86b6ff 0%, #4a89f3 55%, #3a67dc 100%);
      box-shadow:
        0 16px 38px rgba(63, 124, 240, 0.42),
        inset 0 -7px 16px rgba(40, 74, 175, 0.4),
        inset 0 7px 14px rgba(255, 255, 255, 0.5);
    }

    /* 高光光斑：弱化并上移，避免与白色图案叠在一起 */
    .logo-mark::after {
      content: "";
      position: absolute;
      top: 9px;
      left: 18px;
      width: 30px;
      height: 12px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 72%);
      transform: rotate(-20deg);
    }

    .logo-mark svg {
      width: 40px;
      height: 40px;
      color: rgba(255, 255, 255, 0.97);
      filter:
        drop-shadow(0 1px 0 rgba(255, 255, 255, 0.55))
        drop-shadow(0 -1px 1px rgba(38, 78, 170, 0.6));
    }

    /* 地面阴影，随浮动缩放 */
    .logo-orb::after {
      content: "";
      display: block;
      width: 54px;
      height: 10px;
      margin: 16px auto 0;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(63, 124, 240, 0.3) 0%, rgba(63, 124, 240, 0) 70%);
      animation: logo-shadow 4.5s ease-in-out infinite;
    }

    @keyframes logo-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes logo-shadow {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.86); opacity: 0.65; }
    }

    @keyframes halo {
      0%, 100% { opacity: 0.65; transform: translateX(-50%) scale(0.94); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.06); }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-name {
      margin-top: 24px;
      font-size: 27px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-indent: 0.2em;
      background: linear-gradient(135deg, #2b4a86 0%, #4a89f3 60%, #6aa6ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.08s both;
    }

    .slogan {
      margin-top: 12px;
      text-align: center;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.75;
      letter-spacing: 0.1em;
      color: var(--muted);
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.16s both;
    }

    /* Bottom input dock */
    .input-dock {
      padding: 0 20px calc(26px + env(safe-area-inset-bottom));
      position: relative;
      z-index: 1;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.24s both;
    }

    .quick-tags {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      justify-content: center;
    }

    .quick-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border: 1px solid rgba(120, 160, 230, 0.28);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.6);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      color: #3f6fd0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(63, 124, 240, 0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .quick-tag:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(120, 160, 230, 0.55);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(63, 124, 240, 0.16);
    }

    .quick-tag:active {
      transform: translateY(0) scale(0.97);
    }

    .quick-tag svg {
      width: 16px;
      height: 16px;
    }

    .input-shell {
      position: relative;
      background: rgba(255, 255, 255, 0.72);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      backdrop-filter: blur(20px) saturate(1.2);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      padding: 16px 16px 12px;
      box-shadow:
        0 12px 36px rgba(63, 124, 240, 0.14),
        0 1px 0 rgba(255, 255, 255, 0.8) inset;
      transition: box-shadow 0.25s ease, border-color 0.25s ease;
    }

    /* 聚焦时的渐变发光边框 */
    .input-shell:focus-within {
      border-color: rgba(90, 151, 255, 0.55);
      box-shadow:
        0 16px 44px rgba(63, 124, 240, 0.24),
        0 0 0 3px rgba(90, 151, 255, 0.16);
    }

    .input-field {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-size: 16px;
      line-height: 1.5;
      color: var(--ink);
      background: transparent;
      padding: 2px 4px 10px;
      font-family: inherit;
    }

    .input-field::placeholder {
      color: #aab4c4;
    }

    .input-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .tool-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tool-btn {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(120, 160, 230, 0.28);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--brand);
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .tool-btn:hover {
      background: #eef4ff;
      border-color: rgba(120, 160, 230, 0.55);
      transform: translateY(-1px);
    }

    .tool-btn:active {
      transform: scale(0.94);
    }

    .tool-btn svg {
      width: 20px;
      height: 20px;
    }

    .btn-send {
      position: relative;
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #6aa6ff 0%, #4a89f3 50%, #3a67dc 100%);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      box-shadow: 0 8px 20px rgba(63, 124, 240, 0.45);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    .btn-send:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(63, 124, 240, 0.5);
    }

    .btn-send:active {
      transform: scale(0.93);
    }

    .btn-send svg {
      width: 20px;
      height: 20px;
    }

    .file-input {
      display: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-mark,
      .logo-orb,
      .logo-orb::before,
      .logo-orb::after,
      .logo-name,
      .slogan,
      .input-dock {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="hero">
      <div class="logo-orb" aria-hidden="true">
        <div class="logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2 4 5v6c0 5 3.4 8.4 8 11 4.6-2.6 8-6 8-11V5l-8-3z"/>
            <polyline points="9 12 11.5 14.5 15.5 9.5"/>
          </svg>
        </div>
      </div>
      <div class="logo-name">契合</div>
      <div class="slogan">
        <div>拟合同 · 审风险</div>
        <div>一句话就够了</div>
      </div>
    </main>

    <div class="input-dock">
      <div class="quick-tags">
        <button class="quick-tag" type="button" onclick="quickSend('拟定合同')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          拟定合同
        </button>
        <button class="quick-tag" type="button" onclick="quickSend('审查合同')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2 4 5v6c0 5 3.4 8.4 8 11 4.6-2.6 8-6 8-11V5l-8-3z"/>
            <polyline points="9 12 11.5 14.5 15.5 9.5"/>
          </svg>
          审查合同
        </button>
      </div>

      <div class="input-shell">
        <textarea
          id="inputField"
          class="input-field"
          rows="1"
          placeholder="输入拟定合同需求或上传合同文件"
          aria-label="输入消息"
        ></textarea>
        <div class="input-toolbar">
          <div class="tool-left">
            <button class="tool-btn" type="button" aria-label="上传文件" onclick="document.getElementById('fileInput').click()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </button>
            <button class="tool-btn" type="button" aria-label="语音输入">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
              </svg>
            </button>
          </div>
          <button class="btn-send" type="button" aria-label="发送" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"></line>
              <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
          </button>
        </div>
        <input id="fileInput" class="file-input" type="file" multiple />
      </div>
    </div>
  </div>

  <script>
    const field = document.getElementById('inputField');

    field.addEventListener('input', () => {
      field.style.height = 'auto';
      field.style.height = Math.min(field.scrollHeight, 140) + 'px';
    });

    // 发送：携带输入内容跳转到对话页
    function sendMessage() {
      const text = field.value.trim();
      if (!text) return;
      window.location.href = 'chat.html?q=' + encodeURIComponent(text);
    }

    // 点击快捷标签：直接把这四个字作为消息发送
    function quickSend(text) {
      window.location.href = 'chat.html?q=' + encodeURIComponent(text);
    }
  </script>
</body>
</html>
