name: Android Release APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'mobile/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor deps
        working-directory: mobile
        run: npm ci

      - name: Sync Capacitor
        working-directory: mobile
        run: npx cap sync android

      - name: Generate keystore
        working-directory: mobile/android
        run: |
          if [ ! -f qihe-release.jks ]; then
            keytool -genkeypair -v -keystore qihe-release.jks -alias qihe \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass qihe2026 -keypass qihe2026 \
              -dname "CN=Qihe, OU=Mobile, O=Qihe, L=Beijing, ST=Beijing, C=CN"
          fi

      - name: Build Release APK
        working-directory: mobile/android
        env:
          KEYSTORE_PASSWORD: qihe2026
          KEY_ALIAS: qihe
          KEY_PASSWORD: qihe2026
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qihe-release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ github.run_number }}
          name: 契合 Release APK v${{ github.run_number }}
          files: mobile/android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
